    <text class="label" x="171" y="355" text-anchor="middle">Run 20</text>
  </g>
  <g>
    <circle cx="104" cy="430" r="15" fill="#ffffff" stroke="#2f8f4e" stroke-width="1.4"/>
    <text x="104" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#2f8f4e">✓</text>
    <rect x="132" y="411" width="92" height="38" rx="8" fill="#eef5ff" stroke="#2f6fbd" stroke-width="1.1"/>
