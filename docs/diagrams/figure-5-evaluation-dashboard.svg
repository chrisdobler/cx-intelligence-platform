    <path class="grid" d="M 24 42 H 220 M 24 70 H 220 M 24 98 H 220"/>
    <path class="thin" d="M 24 34 V 98 H 220"/>
    <path d="M 42 70 L 92 62 L 142 44 L 192 53" fill="none" stroke="#2f6fbd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#2f6fbd">
      <circle cx="42" cy="70" r="3.4"/>
      <circle cx="92" cy="62" r="3.4"/>
      <circle cx="142" cy="44" r="3.4"/>
      <circle cx="192" cy="53" r="3.4"/>
    </g>
    <text class="small-label" x="42" y="121" text-anchor="middle">95</text>
