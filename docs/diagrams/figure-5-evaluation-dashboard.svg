    <text class="small-label" x="92" y="121" text-anchor="middle">0.84</text>
    <text class="small-label" x="142" y="121" text-anchor="middle">0.88</text>
    <text class="small-label" x="192" y="121" text-anchor="middle">0.87</text>
  </g>

  <g transform="translate(330 465)">
    <text class="label" x="0" y="0">Grounded Responses %</text>
    <rect x="0" y="18" width="240" height="92" rx="8" fill="#ffffff" stroke="#4b5563" stroke-width="1.1"/>
    <path class="grid" d="M 24 42 H 220 M 24 70 H 220 M 24 98 H 220"/>
    <path class="thin" d="M 24 34 V 98 H 220"/>
    <path d="M 42 82 L 92 65 L 142 48 L 192 48" fill="none" stroke="#2f6fbd" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#2f6fbd">
      <circle cx="42" cy="82" r="3.4"/>
      <circle cx="92" cy="65" r="3.4"/>
      <circle cx="142" cy="48" r="3.4"/>
      <circle cx="192" cy="48" r="3.4"/>
    </g>
    <text class="small-label" x="42" y="121" text-anchor="middle">91</text>
    <text class="small-label" x="92" y="121" text-anchor="middle">93</text>
    <text class="small-label" x="142" y="121" text-anchor="middle">95</text>
    <text class="small-label" x="192" y="121" text-anchor="middle">95</text>
  </g>

  <path class="arrow-line" d="M 610 345 H 636"/>

  <rect class="section" x="650" y="95" width="245" height="500" rx="12"/>
  <path class="blue-stroke" d="M 668 134 H 877" fill="none" stroke-width="2"/>
  <text class="section-title" x="772.5" y="124">Baseline Comparison</text>

  <rect x="688" y="175" width="154" height="52" rx="8" fill="#f7f7f7" stroke="#4b5563" stroke-width="1.1"/>
  <text class="label" x="765" y="207" text-anchor="middle">Committed Baseline</text>
  <path class="arrow-line" d="M 765 238 V 290"/>
  <rect x="688" y="302" width="154" height="52" rx="8" fill="#eef5ff" stroke="#2f6fbd" stroke-width="1.1"/>
