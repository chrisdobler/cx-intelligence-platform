    <rect x="132" y="251" width="78" height="38" rx="8" fill="#ffffff" stroke="#4b5563" stroke-width="1.1"/>
    <text class="label" x="171" y="275" text-anchor="middle">Run 19</text>
  </g>
  <g>
    <circle cx="104" cy="350" r="15" fill="#ffffff" stroke="#2f8f4e" stroke-width="1.4"/>
    <text x="104" y="355" text-anchor="middle" font-size="14" font-weight="700" fill="#2f8f4e">✓</text>
