  <line x1="104" y1="185" x2="104" y2="460" stroke="#d1d5db" stroke-width="2"/>
  <g>
    <circle cx="104" cy="190" r="15" fill="#ffffff" stroke="#2f8f4e" stroke-width="1.4"/>
    <text x="104" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#2f8f4e">✓</text>
    <rect x="132" y="171" width="78" height="38" rx="8" fill="#ffffff" stroke="#4b5563" stroke-width="1.1"/>
