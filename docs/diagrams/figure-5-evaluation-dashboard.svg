    <text class="green" x="0" y="42" font-size="16" font-weight="700">✓</text>
    <text class="label" x="24" y="42">Recall@5 +0.03</text>
    <text class="orange" x="0" y="84" font-size="16" font-weight="700">⚠</text>
    <text class="label" x="24" y="84">Citation Accuracy -0.8%</text>
  </g>

  <path class="arrow-line" d="M 905 345 H 931"/>

  <rect class="section" x="945" y="95" width="215" height="500" rx="12"/>
  <path class="blue-stroke" d="M 963 134 H 1142" fill="none" stroke-width="2"/>
  <text class="section-title" x="1052.5" y="124">Versioned Artifacts</text>

  <g transform="translate(982 164)">
    <g>
      <path class="artifact-fill" d="M 0 0 H 118 L 140 22 V 58 H 0 Z" stroke="#4b5563" stroke-width="1.1" fill="#f7f7f7"/>
      <path d="M 118 0 V 22 H 140" fill="none" stroke="#4b5563" stroke-width="1.1"/>
      <text class="small-label" x="70" y="36" text-anchor="middle">evaluation-report.md</text>
    </g>
    <g transform="translate(12 76)">
      <path class="artifact-fill" d="M 0 0 H 118 L 140 22 V 58 H 0 Z" stroke="#4b5563" stroke-width="1.1" fill="#f7f7f7"/>
      <path d="M 118 0 V 22 H 140" fill="none" stroke="#4b5563" stroke-width="1.1"/>
      <text class="small-label" x="70" y="36" text-anchor="middle">evaluation-report.json</text>
    </g>
    <g transform="translate(24 152)">
      <path class="artifact-fill" d="M 0 0 H 118 L 140 22 V 58 H 0 Z" stroke="#4b5563" stroke-width="1.1" fill="#f7f7f7"/>
      <path d="M 118 0 V 22 H 140" fill="none" stroke="#4b5563" stroke-width="1.1"/>
      <text class="small-label" x="70" y="36" text-anchor="middle">evaluation_runs table</text>
    </g>
  </g>

  <g transform="translate(976 400)">
    <rect x="0" y="0" width="153" height="152" rx="10" fill="#ffffff" stroke="#4b5563" stroke-width="1.1"/>
    <text class="label" x="76.5" y="28" text-anchor="middle" font-weight="650">Control Center</text>
    <line x1="18" y1="42" x2="135" y2="42" stroke="#d1d5db" stroke-width="1"/>
    <text class="small-label" x="18" y="66">Latest Score</text>
    <circle cx="130" cy="62" r="4" fill="#2f8f4e"/>
    <text class="small-label" x="18" y="91">Prompt Version</text>
    <rect x="116" y="81" width="18" height="14" rx="3" fill="#eef5ff" stroke="#2f6fbd" stroke-width="1"/>
    <text class="small-label" x="18" y="116">Model Version</text>
    <rect x="116" y="106" width="18" height="14" rx="3" fill="#f3f4f6" stroke="#6b7280" stroke-width="1"/>
    <text class="small-label" x="18" y="141">Regression Status</text>
    <circle cx="130" cy="137" r="4" fill="#d9822b"/>
