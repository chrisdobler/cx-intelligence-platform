<svg id="figure-5-evaluation-dashboard" width="100%" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc" style="max-width: 1200px; background-color: #ffffff;">
  <title id="title">Figure 5 — Historical Evaluation &amp; Regression Tracking</title>
  <desc id="desc">A four-part architectural process diagram showing evaluation runs accumulating over time, historical metrics trending, regression detection against a baseline, and versioned artifacts surfaced in a control center.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555555"/>
    </marker>
    <style>
      #figure-5-evaluation-dashboard {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111111;
      }
      .title {
        fill: #111111;
        font-size: 24px;
        font-weight: 650;
        text-anchor: middle;
      }
      .section {
        fill: #ffffff;
        stroke: #4b5563;
        stroke-width: 1.2;
      }
      .section-title {
        fill: #111111;
        font-size: 17px;
        font-weight: 650;
        text-anchor: middle;
      }
      .label {
        fill: #111111;
        font-size: 14px;
      }
      .small-label {
        fill: #374151;
        font-size: 12px;
      }
      .muted {
        fill: #6b7280;
        font-size: 12px;
      }
      .caption {
        fill: #374151;
        font-size: 15px;
        font-style: italic;
        text-anchor: middle;
      }
      .arrow-line {
        fill: none;
        stroke: #555555;
        stroke-width: 1.4;
        marker-end: url(#arrow);
      }
      .blue-stroke {
        stroke: #2f6fbd;
      }
      .blue-fill {
        fill: #eef5ff;
      }
      .green {
        fill: #2f8f4e;
      }
      .green-stroke {
        stroke: #2f8f4e;
      }
      .orange {
        fill: #d9822b;
      }
      .orange-stroke {
        stroke: #d9822b;
      }
      .gray-fill {
        fill: #f3f4f6;
      }
      .artifact-fill {
        fill: #f7f7f7;
      }
      .thin {
        fill: none;
        stroke: #555555;
        stroke-width: 1.1;
      }
      .grid {
        fill: none;
        stroke: #e5e7eb;
        stroke-width: 1;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#ffffff"/>
  <text class="title" x="600" y="48">Figure 5 — Historical Evaluation &amp; Regression Tracking</text>

