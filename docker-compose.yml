services:
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: cxintel-postgres:pg16
    container_name: cx-postgres
    environment:
      POSTGRES_USER: cx
      POSTGRES_PASSWORD: cx
      POSTGRES_DB: cx
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cx -d cx"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  adminer:
    image: adminer:5
    container_name: cx-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"

volumes:
  pgdata:
