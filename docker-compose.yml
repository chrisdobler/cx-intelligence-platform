services:
  db:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: cxintel-postgres:pg16
    container_name: cx-postgres
    environment:
      POSTGRES_USER: cx
      POSTGRES_PASSWORD: cx
      POSTGRES_DB: cx
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cx -d cx"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  adminer:
    image: adminer:5
    container_name: cx-adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_AUTOLOGIN: "${ADMINER_AUTOLOGIN:-1}"
      ADMINER_AUTOLOGIN_DRIVER: pgsql
      ADMINER_AUTOLOGIN_SERVER: db
      ADMINER_AUTOLOGIN_USERNAME: cx
      ADMINER_AUTOLOGIN_PASSWORD: cx
      ADMINER_AUTOLOGIN_DATABASE: cx
    command: ["php", "-S", "[::]:8080", "-t", "/var/www/html", "/var/www/autologin-router.php"]
    volumes:
      - ./docker/adminer/autologin-router.php:/var/www/autologin-router.php:ro
    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"

volumes:
  pgdata:
